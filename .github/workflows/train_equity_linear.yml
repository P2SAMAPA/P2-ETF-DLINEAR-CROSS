# train_equity_linear.yml — P2-ETF-DLINEAR-CROSS
# Trains DLinear + MoLE-DLinear variants on Option A (Equity ETFs)
# Variants: dlinear_prc, dlinear_ret, mole_prc, mole_ret
# NOTE: Evaluation is NOT run here — use evaluate_only.yml after
# BOTH equity workflows complete to get full results including Crossformer.

name: Train — Option A Equity (Linear Models)

on:
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train_equity_linear:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train DLinear + MoLE variants (Option A)
        run: python train.py --module A --variants dlinear_prc dlinear_ret mole_prc mole_ret

      - name: Commit weights only (no evaluate — run evaluate_only.yml after both workflows finish)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/equity/ results/archive/
          git stash
          git pull --rebase origin main
          git stash pop
          git add results/equity/ results/archive/
          git diff --staged --quiet || git commit -m "chore: equity linear model weights [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Log completion
        run: echo "✅ Equity linear training complete — run evaluate_only.yml next"
