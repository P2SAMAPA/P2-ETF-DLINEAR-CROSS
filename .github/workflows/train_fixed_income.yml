# train_fixed_income.yml — P2-ETF-DLINEAR-CROSS
# Trains DLinear + Crossformer on Option B (Fixed Income / Commodity ETFs).
# Runs daily after equity training, and supports manual trigger.

name: Train — Option B (Fixed Income / Commodities)

on:
  schedule:
    - cron: "30 22 * * 1-5"   # Mon–Fri at 22:30 UTC (staggered 30 min after equity)
  workflow_dispatch:           # manual trigger from GitHub Actions UI

jobs:
  train_fixed_income:
    runs-on: ubuntu-latest
    timeout-minutes: 120       # CPU training may take up to 2 hours

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train Option B models (DLinear + Crossformer)
        run: python train.py --module B

      - name: Evaluate Option B models
        run: python evaluate.py --module B

      - name: Commit results back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/fixed_income/
          git diff --staged --quiet || git commit -m "chore: update fixed income model results [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Log completion
        run: echo "✅ Fixed income training complete at $(date -u)"
