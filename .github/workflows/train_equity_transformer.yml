# train_equity_transformer.yml — P2-ETF-DLINEAR-CROSS
# Trains Crossformer variants on Option A (Equity ETFs)
# Variants: crossformer_prc, crossformer_ret
# NOTE: Evaluation is handled by train_equity_linear.yml
# which runs in parallel and evaluates ALL variants after training.

name: Train — Option A Equity (Crossformer)

on:
  schedule:
    - cron: "0 22 * * 1-5"    # Mon-Fri 22:00 UTC (same time as linear)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train_equity_transformer:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train Crossformer variants (Option A)
        run: python train.py --module A --variants crossformer_prc crossformer_ret

      - name: Commit weights only (no evaluate — handled by linear workflow)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/equity/crossformer_prc_best_20260315.pt \
                  results/equity/crossformer_prc_meta_20260315.json \
                  results/equity/crossformer_ret_best_20260315.pt \
                  results/equity/crossformer_ret_meta_20260315.json \
                  results/equity/scaler_*.pkl || true
          git stash
          git pull --rebase origin main
          git stash pop
          git add results/equity/crossformer_prc_best_*.pt \
                  results/equity/crossformer_prc_meta_*.json \
                  results/equity/crossformer_ret_best_*.pt \
                  results/equity/crossformer_ret_meta_*.json \
                  results/equity/scaler_*.pkl || true
          git diff --staged --quiet || git commit -m "chore: equity crossformer weights [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Log completion
        run: echo "✅ Equity crossformer training complete at $(date -u)"
