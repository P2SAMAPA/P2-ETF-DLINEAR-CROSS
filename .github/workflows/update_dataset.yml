# update_dataset.yml — P2-ETF-DLINEAR-CROSS
# DEBUG VERSION with full logging and artifact capture

name: Update Dataset (Daily) — DEBUG

on:
  schedule:
    - cron: "30 21 * * 1-5"
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        default: "dataset_update"
        type: choice
        options:
          - dataset_update
          - module_A
          - module_B

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip show huggingface-hub

      - name: Verify HF Authentication
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import os
          from huggingface_hub import whoami
          token = os.getenv('HF_TOKEN')
          print(f'Token length: {len(token) if token else 0}')
          try:
              user = whoami(token=token)
              print(f'✅ HF Auth OK: {user[\"name\"]}')
              print(f'   Permissions: {user.get(\"auth\", {}).get(\"accessToken\", {}).get(\"role\", \"unknown\")}')
          except Exception as e:
              print(f'❌ HF Auth Failed: {e}')
              exit(1)
          "

      - name: Run — Dataset Update (Both Modules) with DEBUG
        if: github.event_name == 'schedule' || github.event.inputs.action == 'dataset_update'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python update_dataset.py 2>&1 | tee update_log.txt
          echo "=== SCRIPT EXIT CODE: $? ==="

      - name: Run — Module A (Equity) only with DEBUG
        if: github.event.inputs.action == 'module_A'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python update_dataset.py --module A 2>&1 | tee update_log.txt
          echo "=== SCRIPT EXIT CODE: $? ==="

      - name: Run — Module B (Fixed Income) only with DEBUG
        if: github.event.inputs.action == 'module_B'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python update_dataset.py --module B 2>&1 | tee update_log.txt
          echo "=== SCRIPT EXIT CODE: $? ==="

      - name: Upload debug logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs-${{ github.run_id }}
          path: |
            update_log.txt
            *.parquet
            *.json

      - name: Log completion
        if: always()
        run: |
          echo "✅ Workflow completed at $(date -u)"
          echo "Run ID: ${{ github.run_id }}"
          echo "Download logs from: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
