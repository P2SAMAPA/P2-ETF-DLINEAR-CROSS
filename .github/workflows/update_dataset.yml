# update_dataset.yml — P2-ETF-DLINEAR-CROSS
# DAILY workflow to append the latest trading day's OHLCV data to HF dataset.
# Scheduled: Runs Mon-Fri after US market close.
# Manual: User chooses specific action.

name: Update Dataset (Daily)

on:
  schedule:
    - cron: "30 21 * * 1-5"
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        default: "dataset_update"
        type: choice
        options:
          - dataset_update
          - module_A
          - module_B

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run — Dataset Update (Both Modules)
        if: github.event_name == 'schedule' || github.event.inputs.action == 'dataset_update'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python update_dataset.py

      - name: Run — Module A (Equity) only
        if: github.event.inputs.action == 'module_A'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python update_dataset.py --module A

      - name: Run — Module B (Fixed Income) only
        if: github.event.inputs.action == 'module_B'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python update_dataset.py --module B

      - name: Log completion
        run: echo "✅ Dataset update complete at $(date -u)"
