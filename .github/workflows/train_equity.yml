# train_equity.yml — P2-ETF-DLINEAR-CROSS
# DEPRECATED — replaced by train_equity_linear.yml + train_equity_transformer.yml
# which run in parallel and are faster.
# This file is kept for reference only — do NOT trigger manually.
# Will be deleted in a future cleanup.

name: Train — Option A Equity (ALL variants — DEPRECATED)

on:
  workflow_dispatch:    # manual only — no schedule

permissions:
  contents: write

jobs:
  train_equity:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train ALL Option A variants (sequential — use split workflows instead)
        run: python train.py --module A

      - name: Evaluate Option A models
        run: python evaluate.py --module A

      - name: Commit results back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/equity/ results/archive/
          git stash
          git pull --rebase origin main
          git stash pop
          git add results/equity/ results/archive/
          git diff --staged --quiet || git commit -m "chore: update equity model results [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Log completion
        run: echo "✅ Equity training complete at $(date -u)"
